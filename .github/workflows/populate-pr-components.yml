name: Populate Component Name in PR

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  inject-changed-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Update PR body with component names
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const changedFiles = `${{ steps.changed.outputs.files }}`;
            const fileList = changedFiles.trim().split(' ').map(f => `- ${f}`).join('\n');

            // Replace the placeholder in the "Component Name" section
            const updatedBody = pr.data.body.replace(
              /<!-- COMPONENTS -->/,
              fileList
            );

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: updatedBody,
            });
