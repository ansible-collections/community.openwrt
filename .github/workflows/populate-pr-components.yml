name: Populate Component Name

on:  # yamllint disable-line rule:truthy
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  update-pr-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Write changed files to temp file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const EXCLUDE = [
              /^\.[a-z]/,
              /^(extensions|docs|tests)\//,
              /^roles\/\w+\/molecule\//,
              /^(meta|LICENSES|changelogs|CHANGELOG.*)\//,
              /^\w+\.(toml|md)$/,
              /^noxfile\.py$/,
              /^requirements-test\.txt$/,
            ];
            const files = data
              .map(f => f.filename)
              .filter(f => !EXCLUDE.some(re => re.test(f)))
              .join('\n');
            fs.writeFileSync('/tmp/component.txt',
              `<!-- component-name-start -->\n${files}\n<!-- component-name-end -->`
            );

      - name: Update PR description
        uses: nefrob/pr-description@v1.2.0
        with:
          content: /tmp/component.txt
          contentIsFilePath: true
          regex: "<!-- component-name-start -->.*?<!-- component-name-end -->"
          regexFlags: ims
          appendContentOnMatchOnly: true
          token: ${{ secrets.GITHUB_TOKEN }}
