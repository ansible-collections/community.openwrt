        - uci action plugin - revamp the shell wrapping mechanism (https://github.com/ansible-collections/community.openwrt/pull/14).
        - wrapper - revamp the shell wrapping mechanism (https://github.com/ansible-collections/community.openwrt/pull/14).
      release_summary: 'Use action plugins to "wrap" shell-based modules.

        Update ``build_ignore`` in ``galaxy.yml``.

        Move module docs to ``.py`` files.

        Mark ``shell=ash`` for ``shellcheck``.'
    fragments:
      - 0.2.0.yml
      - 14-wrapper-revamp.yml
    modules:
      - description: Internal wrapper module for OpenWrt shell\-based modules.
        name: wrapper
        namespace: ''
    release_date: '2025-12-14'
  0.3.0:
    changes:
      release_summary: 'Add ``.devcontainer`` setup.

        Create User and Module Dev Guides.

        Generate collection docs in GitHub.

        Simplify collection-level molecule tests.

        Rename setup role to ``community.openwrt.init``.'
    fragments:
      - 0.3.0.yml
    release_date: '2025-12-27'
  0.4.0:
    changes:
      minor_changes:
        - command - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - copy - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - file - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - lineinfile - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - opkg - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - service - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - slurp - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - stat - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - sysctl - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - uci - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
        - wrapper - use functions ``init()`` and ``validate()`` (https://github.com/ansible-collections/community.openwrt/issues/47,
          https://github.com/ansible-collections/community.openwrt/pull/67).
      release_summary: 'Establish mechanism for integration testing.

        Add support to the ``apk`` package manager.

        Modules now have lifecycle functions ``init()`` and ``validate()``.'
    fragments:
      - 0.4.0.yml
      - 67-init-validate.yml
    modules:
      - description: Manage packages with apk on OpenWrt.
        name: apk
        namespace: ''
    release_date: '2026-01-06'
  1.0.0:
    changes:
      release_summary: First GA release of the community.openwrt collection.
    fragments:
      - 1.0.0.yml
    release_date: '2026-01-29'
  1.1.0:
    changes:
      bugfixes:
        - ping - module code must indicate it does not support check mode (https://github.com/ansible-collections/community.openwrt/pull/132).
        - setup - generate an empty factoid when the underlying command ``ubus call``
          returns empty (https://github.com/ansible-collections/community.openwrt/issues/149,
          https://github.com/ansible-collections/community.openwrt/pull/151).
      minor_changes:
        - init role - enable check mode in the task checking package manager compatibility
          (https://github.com/ansible-collections/community.openwrt/pull/136).
        - nohup - use ``init()`` function to declare parameters (https://github.com/ansible-collections/community.openwrt/pull/131).
        - setup - collect ``ansible_date_time`` facts as well (https://github.com/ansible-collections/community.openwrt/issues/52,
          https://github.com/ansible-collections/community.openwrt/pull/138).
        - setup - report ``ansible_pkg_mgr`` fact with the detected package manager
          used (https://github.com/ansible-collections/community.openwrt/pull/136).
      release_summary: See https://github.com/ansible-collections/community.openwrt/blob/main/CHANGELOG.md
        for all changes.
    fragments:
      - 1.1.0.yml
      - 131-nohup-init.yml
      - 132-ping-check-mode.yml
      - 133-ansible-pkg-mgr.yml
      - 138-setup-date.yml
      - 151-setup-netif.yml
    modules:
      - description: Gather package facts in OpenWrt systems.
        name: package_facts
        namespace: ''
      - description: Creates temporary files and directories on OpenWrt nodes.
        name: tempfile
        namespace: ''
    release_date: '2026-02-27'
  1.2.0:
    changes:
      bugfixes:
        - copy - fix destination file name if ``dest`` is a directory (https://github.com/ansible-collections/community.openwrt/pull/165).
        - openwrt_action plugin utils - exception classes were not calling the parent's
          constructor correctly (https://github.com/ansible-collections/community.openwrt/pull/161).
      release_summary: Regular release
    fragments:
      - 1.2.0.yml
      - 161-base-action-exceptions.yml
      - 165-copy-dest-directory.yml
    modules:
      - description: Add or remove groups.
        name: group
        namespace: ''
    release_date: '2026-03-21'
