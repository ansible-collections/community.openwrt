---
- name: Initialize packaging system
  ansible.builtin.include_role:
    name: community.openwrt.init

- name: Run tests when package manager is apk
  when: openwrt_package_manager == "apk"
  block:
    - name: "Install a package (htop)"
      community.openwrt.apk:
        name: "htop"
        state: present
      register: apk_install

    - name: Assert package install succeeded
      ansible.builtin.assert:
        that:
          - apk_install is succeeded

    - name: "Verify package is installed"
      community.openwrt.command:
        cmd: apk info -e htop
      register: apk_verify
      failed_when: apk_verify.rc != 0

    - name: "Remove the package"
      community.openwrt.apk:
        name: "htop"
        state: absent
      register: apk_remove

    - name: Assert package removal succeeded
      ansible.builtin.assert:
        that:
          - apk_remove is succeeded

    - name: Test --allow-untrusted
      block:
        - name: Download a test package
          ansible.builtin.command:
            cmd: 'apk fetch htop -s > /tmp/htop.apk'

        - name: Install untrusted package
          community.openwrt.apk:
            name: /tmp/htop.apk
            state: present
            allow_untrusted: true

        - name: "Verify package is installed"
          community.openwrt.command:
            cmd: apk info -e htop
          register: apk_verify_untrusted
          failed_when: apk_verify_untrusted.rc != 0

      finally:
        - name: Remove downloaded package
          ansible.builtin.file:
            path: /tmp/htop.apk
            state: absent
