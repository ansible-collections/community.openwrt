- name: Wait for connection to OpenWrt device
  community.openwrt.wait_for_connection:
    timeout: 30
  register: wfc_result

- name: Assert wait_for_connection succeeded
  ansible.builtin.assert:
    that:
      - wfc_result is succeeded
      - wfc_result.elapsed is defined
